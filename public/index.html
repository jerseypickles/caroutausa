<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>CAROTA · Neural Atelier</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700;800&family=JetBrains+Mono:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --obsidian: #050608; --obsidian2: #0a0c11; --panel: rgba(13,15,21,.62);
    --gold: #d4af37; --gold-bright: #f3d98a; --gold-dim: #8a7223;
    --line: rgba(212,175,55,.22); --line-soft: rgba(212,175,55,.10);
    --txt: #ece9df; --muted: #94907e;
    --ok: #5bbf97; --bad: #d05a4a;
    --z-bg: 0; --z-sacred: 1; --z-content: 10; --z-header: 30; --z-modal: 100;
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0; background: radial-gradient(1200px 800px at 50% -10%, #0d1018 0%, var(--obsidian) 60%);
    color: var(--txt); font-family: 'JetBrains Mono', ui-monospace, monospace;
    -webkit-font-smoothing: antialiased; overflow-x: hidden; min-height: 100vh;
  }
  canvas#bg { position: fixed; inset: 0; z-index: var(--z-bg); display: block; }
  /* geometria sagrada */
  .sacred {
    position: fixed; top: 50%; left: 50%; width: 760px; height: 760px;
    transform: translate(-50%,-50%); z-index: var(--z-sacred); pointer-events: none;
    opacity: .5; mix-blend-mode: screen;
    animation: spin 140s linear infinite;
  }
  .sacred.slow { animation-duration: 220s; animation-direction: reverse; opacity: .28; width: 1100px; height: 1100px; }
  @keyframes spin { to { transform: translate(-50%,-50%) rotate(360deg); } }
  .vignette { position: fixed; inset: 0; z-index: 2; pointer-events: none;
    background: radial-gradient(120% 90% at 50% 30%, transparent 40%, rgba(0,0,0,.55) 100%); }

  /* HEADER */
  header {
    position: sticky; top: 0; z-index: var(--z-header);
    display: flex; align-items: center; gap: 18px; padding: 18px 32px;
    background: linear-gradient(180deg, rgba(5,6,8,.86), rgba(5,6,8,.2));
    backdrop-filter: blur(10px); border-bottom: 1px solid var(--line-soft);
  }
  .glyph { width: 40px; height: 40px; flex: none; filter: drop-shadow(0 0 8px rgba(212,175,55,.5)); }
  .brand { display: flex; flex-direction: column; gap: 2px; }
  .brand h1 { margin: 0; font-family: 'Cinzel', serif; font-size: 20px; font-weight: 700;
    letter-spacing: 7px; color: var(--gold-bright); }
  .brand .sub { font-size: 10px; letter-spacing: 4px; text-transform: uppercase; color: var(--muted); }
  header .spacer { flex: 1; }
  header .sigil { font-family: 'Cinzel', serif; font-size: 11px; letter-spacing: 3px; color: var(--gold-dim); }

  main { position: relative; z-index: var(--z-content); max-width: 1180px; margin: 0 auto; padding: 40px 28px 80px; }

  /* PANEL ritual */
  .panel {
    position: relative; background: var(--panel); border: 1px solid var(--line);
    border-radius: 4px; padding: 28px; margin-bottom: 34px;
    backdrop-filter: blur(14px) saturate(1.1);
    box-shadow: 0 0 0 1px rgba(0,0,0,.4), 0 30px 80px -40px rgba(0,0,0,.9), inset 0 1px 0 rgba(255,255,255,.03);
  }
  .panel::before, .panel::after {
    content: ''; position: absolute; width: 16px; height: 16px; border: 1px solid var(--gold); opacity: .7;
  }
  .panel::before { top: 7px; left: 7px; border-right: none; border-bottom: none; }
  .panel::after { bottom: 7px; right: 7px; border-left: none; border-top: none; }
  .panel > h2 {
    margin: 0 0 22px; font-family: 'Cinzel', serif; font-size: 15px; font-weight: 600;
    letter-spacing: 5px; text-transform: uppercase; color: var(--gold);
    display: flex; align-items: center; gap: 12px;
  }
  .panel > h2::after { content: ''; flex: 1; height: 1px;
    background: linear-gradient(90deg, var(--line), transparent); }
  .panel > h2 .ct { font-family: 'JetBrains Mono'; font-size: 11px; letter-spacing: 1px; color: var(--muted); font-weight: 400; }

  label { display: block; font-size: 10px; color: var(--muted); margin: 0 0 7px;
    text-transform: uppercase; letter-spacing: 2px; }
  input[type=text] {
    width: 100%; background: rgba(0,0,0,.35); border: 1px solid var(--line-soft); color: var(--txt);
    padding: 12px 14px; border-radius: 3px; font-family: 'JetBrains Mono'; font-size: 13px; margin-bottom: 16px;
    transition: border-color .2s, box-shadow .2s;
  }
  input[type=text]:focus { outline: none; border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold-dim), 0 0 18px -4px var(--gold-dim); }
  .row { display: flex; gap: 14px; flex-wrap: wrap; }
  .row > div { flex: 1; min-width: 150px; }

  /* angulos = sigilos */
  .angles { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }
  .angle-chip {
    border: 1px solid var(--line-soft); background: rgba(0,0,0,.3); padding: 10px 16px; border-radius: 2px;
    font-size: 12px; letter-spacing: 1px; cursor: pointer; user-select: none; transition: .18s; color: var(--muted);
  }
  .angle-chip:hover { border-color: var(--line); color: var(--txt); }
  .angle-chip.on { border-color: var(--gold); background: rgba(212,175,55,.08); color: var(--gold-bright);
    box-shadow: 0 0 16px -6px var(--gold); }

  button {
    font-family: 'Cinzel', serif; letter-spacing: 3px; text-transform: uppercase;
    background: linear-gradient(180deg, var(--gold-bright), var(--gold)); color: #1a1206; border: none;
    padding: 14px 28px; border-radius: 3px; font-weight: 700; font-size: 13px; cursor: pointer;
    transition: filter .2s, box-shadow .2s; box-shadow: 0 0 24px -8px var(--gold);
  }
  button:hover:not(:disabled) { filter: brightness(1.12); box-shadow: 0 0 30px -6px var(--gold); }
  button:disabled { opacity: .45; cursor: not-allowed; }
  button.ghost { background: transparent; color: var(--txt); border: 1px solid var(--line); box-shadow: none; }
  button.ok { background: linear-gradient(180deg,#7fd9b4,var(--ok)); color: #07140d; }
  button.bad { background: linear-gradient(180deg,#e8806f,var(--bad)); color: #1a0706; }
  .hint { font-size: 11px; color: var(--muted); margin-top: 14px; letter-spacing: .5px; }

  /* CATALOGO */
  .pgrid { display: grid; grid-template-columns: repeat(auto-fill, minmax(128px, 1fr)); gap: 14px;
    max-height: 380px; overflow-y: auto; padding: 4px; scrollbar-width: thin; scrollbar-color: var(--gold-dim) transparent; }
  .pcard { position: relative; border: 1px solid var(--line-soft); border-radius: 3px; overflow: hidden;
    cursor: pointer; background: rgba(0,0,0,.3); transition: .2s; }
  .pcard:hover { border-color: var(--line); transform: translateY(-2px); }
  .pcard.sel { border-color: var(--gold); box-shadow: 0 0 0 1px var(--gold), 0 0 24px -8px var(--gold); }
  .pcard img { width: 100%; aspect-ratio: 1; object-fit: cover; display: block; background: var(--obsidian2); }
  .pcard .t { font-size: 10px; padding: 8px; line-height: 1.4; letter-spacing: .5px; color: var(--muted); }
  .pcard.sel .t { color: var(--gold-bright); }

  /* FILTROS */
  .filters { display: flex; gap: 10px; margin-bottom: 22px; flex-wrap: wrap; }
  .filters button { font-family: 'JetBrains Mono'; text-transform: none; letter-spacing: 1px;
    background: rgba(0,0,0,.3); color: var(--muted); border: 1px solid var(--line-soft); padding: 9px 16px;
    font-size: 11px; font-weight: 500; box-shadow: none; }
  .filters button.on { background: rgba(212,175,55,.1); color: var(--gold-bright); border-color: var(--gold); }

  /* QC GRID */
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 20px; }
  .tile { position: relative; background: rgba(0,0,0,.35); border: 1px solid var(--line-soft); border-radius: 3px;
    overflow: hidden; transition: border-color .2s; }
  .tile:hover { border-color: var(--line); }
  .tile img { width: 100%; display: block; aspect-ratio: 2/3; object-fit: cover; background: var(--obsidian2); cursor: zoom-in; }
  .tile .meta { padding: 14px; }
  .tile .meta .a { font-family: 'Cinzel', serif; font-size: 13px; letter-spacing: 1px; color: var(--gold); display: flex; align-items: center; gap: 8px; }
  .tile .meta .b { font-size: 11px; color: var(--muted); margin-top: 5px; letter-spacing: .5px; }
  .tile .acts { display: flex; gap: 9px; padding: 0 14px 14px; }
  .tile .acts button { flex: 1; padding: 10px; font-size: 11px; letter-spacing: 1px; }
  .tile input.note { width: calc(100% - 28px); margin: 0 14px 12px; padding: 9px 11px; font-size: 11px;
    font-family: 'JetBrains Mono'; background: rgba(0,0,0,.4); border: 1px solid var(--line-soft); border-radius: 3px; color: var(--txt); }

  .badge { font-family: 'JetBrains Mono'; font-size: 9px; padding: 3px 8px; border-radius: 2px;
    text-transform: uppercase; letter-spacing: 1.5px; border: 1px solid; }
  .badge.generated { color: var(--gold); border-color: var(--gold-dim); }
  .badge.approved { color: var(--ok); border-color: rgba(91,191,151,.4); }
  .badge.rejected { color: var(--bad); border-color: rgba(208,90,74,.4); }

  /* fidelidad */
  .fid { display: flex; align-items: center; gap: 8px; margin-top: 12px; font-size: 11px; }
  .fid .score { font-family: 'Cinzel', serif; font-weight: 700; font-size: 13px; padding: 3px 10px; border-radius: 2px; letter-spacing: 1px; border: 1px solid; }
  .fid .score.pass { color: var(--ok); border-color: rgba(91,191,151,.5); background: rgba(91,191,151,.07); }
  .fid .score.fail { color: var(--bad); border-color: rgba(208,90,74,.5); background: rgba(208,90,74,.07); }
  .fid .score.pend { color: var(--muted); border-color: var(--line-soft); }
  .fid .lbl { letter-spacing: 2px; text-transform: uppercase; font-size: 9px; color: var(--muted); }
  .fid-issues { font-size: 10px; color: var(--muted); margin-top: 8px; line-height: 1.5; letter-spacing: .3px; }
  .fid-issues b { color: var(--bad); font-weight: 600; letter-spacing: 1px; text-transform: uppercase; font-size: 9px; }

  .empty { color: var(--muted); font-size: 13px; padding: 40px 0; text-align: center; letter-spacing: 1px; }

  /* spinner ritual */
  .spinner { display: inline-block; width: 13px; height: 13px; border: 2px solid var(--line-soft);
    border-top-color: var(--gold); border-radius: 50%; animation: rot 1s linear infinite; vertical-align: -2px; margin-right: 8px; }
  @keyframes rot { to { transform: rotate(360deg); } }

  /* LIGHTBOX */
  .lightbox { position: fixed; inset: 0; background: rgba(3,4,6,.94); z-index: var(--z-modal);
    display: none; align-items: center; justify-content: center; cursor: zoom-out; padding: 28px; backdrop-filter: blur(6px); }
  .lightbox.on { display: flex; }
  .lightbox img { max-width: 100%; max-height: 100%; border-radius: 4px; border: 1px solid var(--line);
    box-shadow: 0 0 60px -10px rgba(212,175,55,.4); }
  .lightbox .close { position: absolute; top: 20px; right: 28px; color: var(--gold); font-size: 32px; line-height: 1;
    cursor: pointer; font-family: 'Cinzel', serif; }

  .reveal { will-change: transform, opacity; }
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-thumb { background: var(--gold-dim); border-radius: 4px; }
  ::-webkit-scrollbar-track { background: transparent; }

  @media (prefers-reduced-motion: reduce) {
    .sacred { animation: none; }
    .spinner { animation-duration: 2s; }
    html { scroll-behavior: auto; }
  }
  @media (max-width: 640px) {
    main { padding: 24px 16px 60px; }
    .panel { padding: 20px; }
    .brand h1 { font-size: 16px; letter-spacing: 4px; }
    header { padding: 14px 18px; }
  }
</style>
</head>

<!-- Geometria sagrada (Flor de la Vida) -->
<script>
(function buildSacred(){
  const NS = 'http://www.w3.org/2000/svg';
  const cx = 300, cy = 300, r = 56;
  const centers = [[0,0]];
  for (let k=0;k<6;k++){ const a=k*Math.PI/3; centers.push([Math.cos(a)*r, Math.sin(a)*r]); }
  for (let k=0;k<6;k++){
    const a=k*Math.PI/3;
    centers.push([Math.cos(a)*r*2, Math.sin(a)*r*2]);
    const a2=a+Math.PI/6; centers.push([Math.cos(a2)*r*Math.sqrt(3), Math.sin(a2)*r*Math.sqrt(3)]);
  }
  ['sacred1','sacred2'].forEach((id) => {
    const svg = document.getElementById(id);
    if (!svg) return;
    centers.forEach(([x,y]) => {
      const c = document.createElementNS(NS,'circle');
      c.setAttribute('cx', cx+x); c.setAttribute('cy', cy+y); c.setAttribute('r', r);
      c.setAttribute('fill','none'); c.setAttribute('stroke','rgba(212,175,55,.55)'); c.setAttribute('stroke-width','.5');
      svg.appendChild(c);
    });
    const big = document.createElementNS(NS,'circle');
    big.setAttribute('cx',cx); big.setAttribute('cy',cy); big.setAttribute('r', r*3);
    big.setAttribute('fill','none'); big.setAttribute('stroke','rgba(212,175,55,.4)'); big.setAttribute('stroke-width','.6');
    svg.appendChild(big);
  });
})();
</script>

<!-- Three.js: red neuronal 3D -->
<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>
<script type="module">
const reduce = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
const canvas = document.getElementById('bg');
if (!reduce && canvas) {
  try {
    const THREE = await import('three');
    const renderer = new THREE.WebGLRenderer({ canvas, alpha: true, antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(58, innerWidth/innerHeight, 0.1, 100);
    camera.position.z = 19;
    const resize = () => { renderer.setSize(innerWidth, innerHeight); camera.aspect = innerWidth/innerHeight; camera.updateProjectionMatrix(); };
    resize(); addEventListener('resize', resize);

    const group = new THREE.Group(); scene.add(group);
    const N = 160, nodes = [];
    for (let i=0;i<N;i++){
      const rad = 7 + Math.random()*7;
      const t = Math.random()*Math.PI*2, p = Math.acos(2*Math.random()-1);
      nodes.push(new THREE.Vector3(rad*Math.sin(p)*Math.cos(t), rad*Math.sin(p)*Math.sin(t), rad*Math.cos(p)));
    }
    const pts = new THREE.Points(
      new THREE.BufferGeometry().setFromPoints(nodes),
      new THREE.PointsMaterial({ color: 0xd4af37, size: 0.16, transparent: true, opacity: 0.92, sizeAttenuation: true })
    );
    group.add(pts);

    const segs = [], maxd = 3.6;
    for (let i=0;i<N;i++) for (let j=i+1;j<N;j++) if (nodes[i].distanceTo(nodes[j]) < maxd) segs.push(nodes[i], nodes[j]);
    const lines = new THREE.LineSegments(
      new THREE.BufferGeometry().setFromPoints(segs),
      new THREE.LineBasicMaterial({ color: 0xc8a24a, transparent: true, opacity: 0.12 })
    );
    group.add(lines);

    // polvo dorado lejano
    const dust = [];
    for (let i=0;i<240;i++) dust.push(new THREE.Vector3((Math.random()-.5)*70,(Math.random()-.5)*70,(Math.random()-.5)*70));
    const dustPts = new THREE.Points(
      new THREE.BufferGeometry().setFromPoints(dust),
      new THREE.PointsMaterial({ color: 0x8a7223, size: 0.07, transparent: true, opacity: 0.5 })
    );
    scene.add(dustPts);

    let mx = 0, my = 0;
    addEventListener('pointermove', (e) => { mx = e.clientX/innerWidth - .5; my = e.clientY/innerHeight - .5; });

    const clock = new THREE.Clock();
    const tick = () => {
      const t = clock.getElapsedTime();
      group.rotation.y = t*0.05 + mx*0.6;
      group.rotation.x = Math.sin(t*0.1)*0.12 + my*0.45;
      dustPts.rotation.y = -t*0.01;
      lines.material.opacity = 0.07 + Math.abs(Math.sin(t*0.5))*0.09;
      renderer.render(scene, camera);
      requestAnimationFrame(tick);
    };
    tick();
  } catch (e) { console.warn('WebGL no disponible:', e); }
}
</script>

<!-- App logic -->
<script>
const ANGLES = [
  { id: 'realista', label: 'Fitpic natural' },
  { id: 'realismo_completo', label: 'Máximo realismo' },
  { id: 'gancho_click', label: 'Hero / gancho' },
  { id: 'llamada_atencion', label: 'Llamada de atención' },
];
let selected = new Set(['realista']);
let filter = 'generated';
let products = [];
let selectedProductId = null;
let pollTimer = null;
let lastSig = null;

async function loadProducts() {
  try {
    const r = await fetch('/api/products');
    const data = await r.json();
    products = data.products || [];
    document.getElementById('pcount').textContent = `· ${products.length} reliquias`;
    renderProducts();
  } catch (e) {
    document.getElementById('pgrid').innerHTML = '<div class="empty">No se pudo invocar el catálogo.</div>';
  }
}

function renderProducts() {
  const q = document.getElementById('psearch').value.trim().toLowerCase();
  const list = q ? products.filter(p => (p.title + ' ' + (p.wash || '')).toLowerCase().includes(q)) : products;
  document.getElementById('pgrid').innerHTML = list.map(p => `
    <div class="pcard ${p.id === selectedProductId ? 'sel' : ''}" onclick="pickProduct(${p.id})" title="${p.title}">
      <img src="${p.image}&width=240" loading="lazy" alt="${p.title}" />
      <div class="t">${p.title}</div>
    </div>`).join('');
}

function pickProduct(id) {
  const p = products.find(x => x.id === id);
  if (!p) return;
  selectedProductId = id;
  document.getElementById('imageUrl').value = p.image;
  document.getElementById('product').value = p.title;
  if (p.wash) document.getElementById('wash').value = p.wash;
  renderProducts();
  document.getElementById('imageUrl').scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function renderAngles() {
  document.getElementById('angles').innerHTML = ANGLES.map(a =>
    `<span class="angle-chip ${selected.has(a.id) ? 'on' : ''}" onclick="toggleAngle('${a.id}')">${a.label}</span>`
  ).join('');
}
function toggleAngle(id) {
  if (selected.has(id)) selected.delete(id); else selected.add(id);
  renderAngles();
}
function setFilter(f) {
  filter = f;
  lastSig = null;
  document.querySelectorAll('#filters button').forEach(b => b.classList.toggle('on', b.dataset.f === f));
  loadQueue();
}

async function generate() {
  const imageUrl = document.getElementById('imageUrl').value.trim();
  if (!imageUrl) return alert('Pegá la URL de la foto del producto.');
  if (!selected.size) return alert('Elegí al menos un ángulo.');
  const btn = document.getElementById('genBtn');
  const hint = document.getElementById('genHint');
  btn.disabled = true;
  try {
    const body = {
      imageUrl, angles: [...selected],
      drop: document.getElementById('drop').value.trim() || undefined,
      wash: document.getElementById('wash').value.trim() || undefined,
      product: document.getElementById('product').value.trim() || undefined,
    };
    const r = await fetch('/api/ad-angles', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    const data = await r.json();
    if (!r.ok) throw new Error(data.error || 'Error generando');
    hint.textContent = `Invocados ${data.queued.length} ángulo(s). Forjando en el plano astral (~2 min c/u)…`;
    setFilter('generated');
  } catch (e) {
    hint.textContent = 'Error: ' + e.message;
  } finally {
    btn.disabled = false;
  }
}

function fidelityHtml(c) {
  if (c.genStatus !== 'ready') return '';
  if (c.fidelityStatus === 'pending') {
    return `<div class="fid"><span class="spinner"></span><span class="lbl">El juez observa…</span></div>`;
  }
  if (c.fidelityStatus === 'failed') {
    return `<div class="fid"><span class="score pend">— / 100</span><span class="lbl">no evaluada</span></div>`;
  }
  if (c.fidelityStatus === 'done') {
    const cls = c.fidelityVerdict === 'pass' ? 'pass' : 'fail';
    const issues = (c.fidelityIssues && c.fidelityIssues.length)
      ? `<div class="fid-issues"><b>Pierde:</b> ${c.fidelityIssues.join(' · ')}</div>`
      : `<div class="fid-issues">Diseño preservado íntegramente.</div>`;
    return `<div class="fid"><span class="score ${cls}">${c.fidelityScore} / 100</span>
      <span class="lbl">${c.fidelityVerdict === 'pass' ? 'fiel' : 'revisar'}</span></div>${issues}`;
  }
  return '';
}

function tilePlaceholder(text, withSpinner) {
  return `<div style="aspect-ratio:2/3;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:11px;text-align:center;padding:0 12px;letter-spacing:1px">
    ${withSpinner ? '<span class="spinner"></span>' : ''}${text}</div>`;
}

function openZoom(src) {
  document.getElementById('lightboxImg').src = src;
  document.getElementById('lightbox').classList.add('on');
}
function closeZoom() {
  document.getElementById('lightbox').classList.remove('on');
  document.getElementById('lightboxImg').src = '';
}
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeZoom(); });

async function loadQueue() {
  const r = await fetch('/api/creatives' + (filter ? `?qcStatus=${filter}` : ''));
  const { creatives } = await r.json();

  clearTimeout(pollTimer);
  const working = creatives.some(c => c.genStatus === 'generating' || (c.genStatus === 'ready' && c.fidelityStatus === 'pending'));
  if (working) pollTimer = setTimeout(loadQueue, 5000);

  const sig = creatives.map(c => `${c._id}:${c.genStatus}:${c.qcStatus}:${c.qcNotes || ''}:${c.fidelityStatus}:${c.fidelityScore}`).join('|');
  if (sig === lastSig) return;
  lastSig = sig;

  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  empty.style.display = creatives.length ? 'none' : 'block';

  grid.innerHTML = creatives.map(c => {
    let visual;
    if (c.genStatus === 'generating') visual = tilePlaceholder('Forjando…', true);
    else if (c.genStatus === 'failed') visual = tilePlaceholder('✕ Falló: ' + (c.genError || 'error'), false);
    else if (c.qcStatus === 'rejected') visual = tilePlaceholder('sin imagen', false);
    else visual = `<img src="/api/creatives/${c._id}/image" loading="lazy" onclick="openZoom('/api/creatives/${c._id}/image')" alt="${c.angle}" />`;

    const canQc = c.genStatus === 'ready' && c.qcStatus === 'generated';
    return `<div class="tile">
      ${visual}
      <div class="meta">
        <div class="a">${c.angle} <span class="badge ${c.qcStatus}">${c.qcStatus}</span></div>
        <div class="b">${[c.product, c.wash, c.drop].filter(Boolean).join(' · ') || '—'}</div>
        ${fidelityHtml(c)}
        ${c.qcNotes ? `<div class="b">✎ ${c.qcNotes}</div>` : ''}
      </div>
      ${canQc ? `
        <input class="note" id="note-${c._id}" placeholder="Nota del juicio (tell detectado…)" />
        <div class="acts">
          <button class="ok" onclick="qc('${c._id}','approved')">Consagrar</button>
          <button class="bad" onclick="qc('${c._id}','rejected')">Desterrar</button>
        </div>` : ''}
    </div>`;
  }).join('');
}

async function qc(id, qcStatus) {
  const noteEl = document.getElementById('note-' + id);
  const qcNotes = noteEl ? noteEl.value.trim() : '';
  await fetch(`/api/creatives/${id}/qc`, {
    method: 'PATCH', headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ qcStatus, qcNotes: qcNotes || undefined }),
  });
  loadQueue();
}

renderAngles();
loadProducts();
loadQueue();
</script>
</body>
</html>
